name: Build and Release APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Cache Gradle dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          ~/.android/build-cache
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Validate Gradle wrapper
      uses: gradle/actions/wrapper-validation@v3

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Extract version info
      id: version
      run: |
        VERSION_NAME=$(grep "versionName" app/build.gradle | sed 's/.*versionName[[:space:]]*["\x27]\([^"\x27]*\)["\x27].*/\1/')
        VERSION_CODE=$(grep "versionCode" app/build.gradle | sed 's/.*versionCode[[:space:]]*\([0-9]*\).*/\1/')
        echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
        echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
        echo "Version: $VERSION_NAME (Code: $VERSION_CODE)"

    - name: Rename APK
      run: |
        mv app/build/outputs/apk/debug/*.apk RS-Assistant-v${{ steps.version.outputs.version_name }}.apk || true

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RS-Assistant-v${{ steps.version.outputs.version_name }}
        path: RS-Assistant-v${{ steps.version.outputs.version_name }}.apk
        retention-days: 30

    - name: Upload build outputs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-outputs
        path: app/build/outputs/
        retention-days: 7

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-apk
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Extract version info
      id: version
      run: |
        VERSION_NAME=$(grep "versionName" app/build.gradle | sed 's/.*versionName[[:space:]]*["\x27]\([^"\x27]*\)["\x27].*/\1/')
        VERSION_CODE=$(grep "versionCode" app/build.gradle | sed 's/.*versionCode[[:space:]]*\([0-9]*\).*/\1/')
        echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
        echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

    - name: Download APK artifact
      uses: actions/download-artifact@v4
      with:
        name: RS-Assistant-v${{ steps.version.outputs.version_name }}
        path: ./release

    - name: Generate release notes
      id: notes
      run: |
        # Get commits since last tag
        LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
        
        if [ -n "$LAST_TAG" ]; then
          COMMITS=$(git log $LAST_TAG..HEAD --pretty=format:"- %s (%h)" --no-merges)
        else
          COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
        fi
        
        # Create release notes
        cat << EOF > release_notes.md
        ## RS Assistant v${{ steps.version.outputs.version_name }}
        
        ### What's Changed
        $COMMITS
        
        ### Installation
        1. Download the APK below
        2. Enable "Install from unknown sources" in Android settings
        3. Open the APK and follow installation prompts
        
        ### Requirements
        - Android 7.0 (API 24) or higher
        - Grant all requested permissions
        - Enable Accessibility Service for full functionality
        
        **Full Changelog**: https://github.com/${{ github.repository }}/commits/v${{ steps.version.outputs.version_name }}
        EOF
        
        echo "release_notes_file=release_notes.md" >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.version_name }}
        name: RS Assistant v${{ steps.version.outputs.version_name }}
        body_path: release_notes.md
        draft: false
        prerelease: false
        files: |
          release/RS-Assistant-v${{ steps.version.outputs.version_name }}.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Summary
      run: |
        echo "## Release Created! :rocket:" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Version**: v${{ steps.version.outputs.version_name }}" >> $GITHUB_STEP_SUMMARY
        echo "**Download**: [GitHub Releases](https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version_name }})" >> $GITHUB_STEP_SUMMARY
