name: Build and Release APK v104

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Rename APK
      run: |
        mv app/build/outputs/apk/debug/*.apk RS-Assistant-v104.apk || true

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RS-Assistant-v104
        path: RS-Assistant-v104.apk

    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: success()
      with:
        tag_name: v104
        name: RS Assistant v104 - ULTIMATE AI Assistant with SOS & Smart Features
        body: |
          ## RS Assistant v104 - THE MOST POWERFUL VERSION! 🚀🚀🚀

          AI Voice Assistant with COMPLETE phone control + Emergency SOS + Smart Features!

          ### 🆕 NEW in v104
          - **🆘 Emergency SOS System** - Send location to emergency contact instantly!
          - **🧠 Smart Assistant Manager** - Auto-reply, smart suggestions, custom commands
          - **⏰ Reminder System** - Set reminders by voice!
          - **📍 Location Sharing** - Share your location in emergencies
          - **💬 Auto-Reply** - Context-aware auto responses
          - **🎯 Custom Commands** - Create your own voice shortcuts
          - **📊 System Info** - Check device performance

          ### ✨ All Features
          **Phone Control:**
          - Volume Control (up/down/mute/full)
          - Lock Screen
          - Power Off / Restart
          - Silent/Vibrate Mode
          - Media Controls (Play/Pause/Next/Previous)
          
          **Emergency Features:**
          - 🆘 SOS Button - Instant emergency alert
          - 📍 Location Share with GPS
          - 📞 Auto SMS to emergency contact
          
          **Smart Features:**
          - Time-based suggestions
          - Custom voice commands
          - Action history
          - Auto-reply system
          
          **Other Controls:**
          - Camera & Flashlight
          - WiFi & Bluetooth
          - Calls & SMS
          - Time & Alarms
          - Jokes & Weather info

          ### Voice Commands (Hindi/English)
          **Emergency:**
          - "SOS" / "Emergency" / "मदद" - Trigger emergency SOS
          
          **Volume & Sound:**
          - "Volume jyada karo" / "Volume up"
          - "Volume kam karo" / "Volume down"
          - "Mute karo" / "Silent mode"
          
          **Phone Control:**
          - "Lock karo" / "Screen lock"
          - "Power off karo"
          - "Restart karo"
          
          **AI Conversations:**
          - "Hello" / "Namaste"
          - "Help" / "Madad"
          - "Joke sunao" - Hear a joke
          - "Kya kar sakte ho" - What can you do

          ### Requirements
          - Android 7.0 (API 24) or higher
          - Grant ALL permissions
          - Enable Accessibility Service
          - Enable Device Admin
          - Disable Battery Optimization
          - Set Emergency Contact in Settings

          ### Download
          **RS-Assistant-v104.apk** - Ultimate version with all features!

        files: |
          RS-Assistant-v104.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
