name: Build and Release APK v101

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Rename APK
      run: |
        mv app/build/outputs/apk/debug/*.apk RS-Assistant-v101.apk || true

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RS-Assistant-v101
        path: RS-Assistant-v101.apk

    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: success()
      with:
        tag_name: v101
        name: RS Assistant v101 - Volume & Power Control
        body: |
          ## RS Assistant v101 - NEW VERSION!

          AI Voice Assistant for Android with COMPLETE phone control.

          ### 🆕 NEW FEATURES in v101
          - **Volume Control** - "Volume jyada karo" / "Volume kam karo"
          - **Lock Screen** - "Lock karo" / "Screen lock"
          - **Power Off** - "Power off karo" / "Phone band karo"
          - **Silent/Vibrate Mode** - "Silent mode" / "Vibrate mode"
          - **Media Controls** - "Play/Pause" / "Next song" / "Previous song"
          - **Device Admin Integration** - Full device control permissions
          - **Battery Optimization Bypass** - Always running in background

          ### Features
          - Voice Recognition (Hindi/English/Hinglish)
          - Wake Word Detection
          - Phone Control via Accessibility Service
          - Camera Control with Hand Gesture Detection
          - OAuth Authentication via chat.z.ai
          - Background Voice Service
          - Boot Auto-Start

          ### Voice Commands (Hindi/English)
          **Volume & Sound:**
          - "Volume jyada karo" / "Volume up" - Increase volume
          - "Volume kam karo" / "Volume down" - Decrease volume
          - "Volume full" / "Volume max" - Maximum volume
          - "Mute karo" / "Silent mode" - Mute/Silent
          - "Vibrate mode" - Set vibrate mode

          **Phone Control:**
          - "Lock karo" / "Screen lock" - Lock screen
          - "Power off karo" - Power menu
          - "Restart karo" - Restart phone

          **Apps & Settings:**
          - "Call [contact]" - Make phone calls
          - "Message [contact]" - Send messages
          - "Open [app]" - Launch applications
          - "Flashlight on/off" / "Torch on/off" - Control torch
          - "WiFi settings" / "Bluetooth settings" - Open settings
          - "Camera kholo" / "Photo lelo" - Open camera

          **Navigation:**
          - "Back karo" - Go back
          - "Home karo" - Go home
          - "Scroll up/down" - Scroll gestures

          **Time & Media:**
          - "Time batao" / "What time is it" - Get current time
          - "Play/Pause" - Media control
          - "Next song" / "Previous song" - Track control

          ### Download
          - **RS-Assistant-v101.apk** - Latest version with all features

          ### Requirements
          - Android 7.0 (API 24) or higher
          - Grant ALL permissions for full functionality
          - Enable Accessibility Service for phone control
          - Enable Device Admin for lock/power features
          - Disable Battery Optimization for always-running

        files: |
          RS-Assistant-v101.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
