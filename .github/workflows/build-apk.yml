name: Build and Release APK v105

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Rename APK
      run: |
        mv app/build/outputs/apk/debug/*.apk RS-Assistant-v105.apk || true

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RS-Assistant-v105
        path: RS-Assistant-v105.apk

    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: success()
      with:
        tag_name: v105
        name: RS Assistant v105 - MEMORY SYSTEM & SHAKE TORCH
        body: |
          ## RS Assistant v105 - SMART MEMORY & GESTURE CONTROL! 🧠📳

          AI Voice Assistant with Self-Learning Memory & Motorola-style Shake Torch!

          ### 🆕 NEW in v105
          - **🧠 Memory System** - Saves all commands, learns your patterns!
          - **📳 Shake to Torch** - Shake phone to toggle flashlight (Motorola-style)!
          - **📊 Feature Memory** - Track usage, favorites, history!
          - **🎯 Custom Shortcuts** - Create your own voice shortcuts!
          - **⚡ System-Level Control** - Once set up, works even when app is closed!
          - **📈 Smart Predictions** - Predicts your next command based on time!

          ### ✨ Memory Features
          - **Command History** - All commands saved automatically
          - **Feature Usage Tracking** - See which features you use most
          - **Favorites** - Mark features as favorites for quick access
          - **Pattern Learning** - Learns when you use specific commands
          - **Smart Suggestions** - Time-based predictions
          - **Custom Shortcuts** - Create voice shortcuts like "goodnight" = silent mode + alarm

          ### 📳 Shake to Torch
          - **Enable in app or by voice** - "Shake on"
          - **System-level** - Works even when screen is off!
          - **Adjustable sensitivity** - Customize shake detection
          - **Vibration feedback** - Feel when torch toggles
          - **Just like Motorola!** - True system-level control

          ### Voice Commands
          **Memory & Features:**
          - "Show features" - See all features & memory
          - "Shake on/off" - Toggle shake detection
          - "Torch on/off" - Control flashlight

          **Phone Control:**
          - "Volume jyada karo" / "Volume kam karo"
          - "Lock karo" / "Screen lock"
          - "Power off karo"
          - "Silent mode" / "Vibrate mode"

          **Emergency:**
          - "SOS" / "Emergency" / "मदद"

          ### Requirements
          - Android 7.0 (API 24) or higher
          - Grant ALL permissions
          - Enable Accessibility Service
          - Enable Device Admin
          - Disable Battery Optimization
          - Enable Shake Detection for torch feature

          ### Download
          **RS-Assistant-v105.apk** - With Memory & Shake Torch!

        files: |
          RS-Assistant-v105.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
