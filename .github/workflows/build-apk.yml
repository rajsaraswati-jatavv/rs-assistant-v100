name: Build and Release APK v102

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Rename APK
      run: |
        mv app/build/outputs/apk/debug/*.apk RS-Assistant-v102.apk || true

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RS-Assistant-v102
        path: RS-Assistant-v102.apk

    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: success()
      with:
        tag_name: v102
        name: RS Assistant v102 - Z.AI Fix & Demo Mode
        body: |
          ## RS Assistant v102 - LATEST VERSION

          AI Voice Assistant for Android with COMPLETE phone control.

          ### 🆕 FIXED in v102
          - **Z.AI Connection Fixed** - Demo mode works instantly!
          - **Instant Login** - No server dependency
          - **All Features Work** - Volume, Power, Lock, Camera, etc.

          ### ✨ Features
          - **Volume Control** - "Volume jyada karo" / "Volume kam karo"
          - **Lock Screen** - "Lock karo" / "Screen lock"
          - **Power Off** - "Power off karo" / "Phone band karo"
          - **Silent/Vibrate Mode** - "Silent mode" / "Vibrate mode"
          - **Media Controls** - "Play/Pause" / "Next song" / "Previous song"
          - **Camera Control** - "Camera kholo" / "Photo lelo"
          - **Flashlight** - "Torch on" / "Torch off"
          - **Phone Calls** - "Call karo"
          - **Messages** - "Message bhejo"
          - **Time** - "Time batao"
          - **WiFi/Bluetooth** - "WiFi settings" / "Bluetooth settings"

          ### Voice Commands (Hindi/English)
          **Volume & Sound:**
          - "Volume jyada karo" / "Volume up" - Increase volume
          - "Volume kam karo" / "Volume down" - Decrease volume
          - "Volume full" / "Volume max" - Maximum volume
          - "Mute karo" / "Silent mode" - Mute/Silent
          - "Vibrate mode" - Set vibrate mode

          **Phone Control:**
          - "Lock karo" / "Screen lock" - Lock screen
          - "Power off karo" - Power menu
          - "Restart karo" - Restart phone

          ### Requirements
          - Android 7.0 (API 24) or higher
          - Grant ALL permissions
          - Enable Accessibility Service
          - Enable Device Admin

          ### Download
          **RS-Assistant-v102.apk** - Latest version

        files: |
          RS-Assistant-v102.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
