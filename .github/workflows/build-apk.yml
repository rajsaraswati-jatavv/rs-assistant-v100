name: Build and Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Build Release APK
      run: ./gradlew assembleRelease --no-daemon

    - name: Rename APK
      run: |
        mv app/build/outputs/apk/debug/*.apk RS-Assistant-v100-Debug.apk || true
        mv app/build/outputs/apk/release/*.apk RS-Assistant-v100-Release.apk || true

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RS-Assistant-Debug
        path: RS-Assistant-v100-Debug.apk

    - name: Upload Release APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RS-Assistant-Release
        path: RS-Assistant-v100-Release.apk

    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: success()
      with:
        tag_name: v${{ github.run_number }}
        name: RS Assistant v100 - Build ${{ github.run_number }}
        body: |
          ## RS Assistant v100

          AI Voice Assistant for Android with complete phone control.

          ### Features
          - Voice Recognition (Hindi/English/Hinglish)
          - Wake Word Detection
          - Phone Control via Accessibility Service
          - Camera Control
          - Hand Gesture Detection
          - OAuth Authentication via chat.z.ai
          - Background Voice Service

          ### Voice Commands
          - "Call [contact]" - Make phone calls
          - "Message [contact]" - Send messages
          - "Open [app]" - Launch applications
          - "Flashlight on/off" - Control torch
          - "WiFi settings" - Open settings
          - "What time is it" - Get current time
          - "Scroll up/down" - Navigation gestures
          - And many more...

          ### Download
          - **RS-Assistant-v100-Debug.apk** - Debug build with logging
          - **RS-Assistant-v100-Release.apk** - Optimized release build

          ### Requirements
          - Android 7.0 (API 24) or higher
          - Grant all requested permissions for full functionality
          - Enable Accessibility Service for phone control features

        files: |
          RS-Assistant-v100-Debug.apk
          RS-Assistant-v100-Release.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
